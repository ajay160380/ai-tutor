{% extends 'base.html' %}
{% block title %}Login — EduAI{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card animate-fadeinup">
    <!-- Logo -->
    <div class="auth-logo">
      <i class="bi bi-mortarboard-fill" style="color: var(--primary);"></i> EduAI
    </div>
    <h2 class="fw-bold">Welcome Back! 👋</h2>

    <!-- Auth Tabs -->
    <div class="auth-tabs">
      <a href="{% url 'login' %}" class="auth-tab active" style="text-decoration:none;">Login</a>
      <a href="{% url 'register' %}" class="auth-tab" style="text-decoration:none;">Sign Up</a>
    </div>

    <!-- Login Form -->
    <form method="POST" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label-custom">Username</label>
        {{ form.username }}
      </div>

      <div class="mb-3">
        <label class="form-label-custom">Password</label>
        {{ form.password }}
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember" name="remember">
          <label class="form-check-label" for="remember" style="font-size: 0.9rem; color: var(--text-muted);">Yaad rakho</label>
        </div>
        <a href="#" style="font-size: 0.9rem;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>

    <!-- Divider -->
    <div class="d-flex align-items-center my-3">
      <hr class="flex-grow-1" style="border-color: var(--border);">
      <span class="px-3 text-muted" style="font-size: 0.85rem;">or</span>
      <hr class="flex-grow-1" style="border-color: var(--border);">
    </div>

    <!-- Google Sign In (UI only) -->
    <button class="google-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>

    <p class="text-center text-muted mt-4" style="font-size: 0.8rem;">
      Don't have an account? <a href="{% url 'register' %}" class="fw-semibold">Register</a>
    </p>
  </div>
</section>
{% endblock %}

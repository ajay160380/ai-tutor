{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Focus Room - EduAI</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5.3 & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="{% static 'css/focus.css' %}">
</head>
<body class="focus-body">

  <!-- Immersive Animated Background -->
  <div class="focus-bg">
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
    <div class="aurora aurora-3"></div>
  </div>

  <!-- Top Navigation (Minimal) -->
  <div class="focus-top-nav">
    <a href="{% url 'dashboard' %}" class="btn-exit-focus">
      <i class="bi bi-arrow-left"></i> Exit Focus
    </a>
    <div class="focus-title">
      <i class="bi bi-moon-stars"></i> Zen Focus Room
    </div>
    <div class="audio-controls">
      <button class="btn-audio" id="toggleAudioBtn" aria-label="Play/Pause Ambient Music">
        <i class="bi bi-volume-mute-fill" id="audioIcon"></i> Lo-Fi Ambient
      </button>
      <!-- Hidden audio element for ambient sound (using a royalty free lo-fi beat URL) -->
      <audio id="ambientAudio" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-lo-fi-beats-253.mp3" type="audio/mpeg">
      </audio>
    </div>
  </div>

  <!-- Main Content -->
  <div class="focus-container">
    <div class="row w-100">
      
      <!-- Left Column: Tasks -->
      <div class="col-md-3 focus-col">
        <div class="glass-panel tasks-panel">
          <h4 class="glass-title"><i class="bi bi-list-check"></i> Session Tasks</h4>
          <div class="input-group mb-3 mt-3">
            <input type="text" id="newTaskInput" class="form-control focus-input" placeholder="What to focus on?">
            <button class="btn btn-add-task" id="addTaskBtn"><i class="bi bi-plus"></i></button>
          </div>
          <ul class="task-list" id="taskList">
            <!-- Tasks will be added here via JS -->
          </ul>
        </div>
      </div>

      <!-- Center Column: Pomodoro Timer -->
      <div class="col-md-6 focus-col timer-col">
        <div class="timer-container">
          <div class="timer-display" id="timeDisplay">25:00</div>
          <div class="timer-status" id="timerStatus">Focus Mode</div>
          <div class="timer-controls">
            <button class="btn-timer-primary" id="startBtn">Start</button>
            <button class="btn-timer-secondary" id="pauseBtn">Pause</button>
            <button class="btn-timer-secondary" id="resetBtn"><i class="bi bi-arrow-counterclockwise"></i></button>
          </div>
          <div class="timer-modes mt-4">
            <button class="mode-btn active" data-time="25" data-mode="focus">Pomodoro (25m)</button>
            <button class="mode-btn" data-time="5" data-mode="break">Short Break (5m)</button>
            <button class="mode-btn" data-time="15" data-mode="break">Long Break (15m)</button>
          </div>
        </div>
      </div>

      <!-- Right Column: Quick AI Tutor -->
      <div class="col-md-3 focus-col">
        <div class="glass-panel ai-panel">
          <h4 class="glass-title"><i class="bi bi-robot"></i> Quick Doubt</h4>
          <p class="ai-subtitle">Stuck? Ask without losing focus.</p>
          
          <div class="quick-chat-box" id="quickChatBox">
            <div class="chat-message bot-message">
              Hello! I'm here to help you focus. Need to clarify a concept quickly?
            </div>
          </div>
          
          <form id="quickChatForm" class="mt-3">
            {% csrf_token %}
            <div class="input-group">
              <input type="text" id="quickChatInput" class="form-control focus-input" placeholder="Ask AI..." required>
              <button class="btn btn-send-ai" type="submit"><i class="bi bi-send-fill"></i></button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>

  <!-- Javascript -->
  <script src="{% static 'js/focus.js' %}"></script>
</body>
</html>
